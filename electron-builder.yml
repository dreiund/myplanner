appId: com.myplanner.app
productName: MyPlanner
directories:
  output: release

files:
  - dist/**/*
  - package.json

asar: true
asarUnpack:
  - "**/*.node"
  - "node_modules/better-sqlite3/**"

mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity
  icon: build/icon.icns

win:
  target:
    - nsis
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico

linux:
  target:
    - AppImage
    - deb
  category: Office
  icon: build/icons
